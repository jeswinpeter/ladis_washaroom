version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: smart_travel_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_travel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: smart_travel_api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/smart_travel
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  pgdata: